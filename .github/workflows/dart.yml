name: iOS-ipa-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # <-- THIS LINE downloads your .mp4 files correctly

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Flutter pub get
        run: flutter pub get

      - name: Set iOS deployment target in Podfile
        run: |
          cd ios
          if ! grep -q "platform :ios" Podfile; then
            echo "platform :ios, '15.0'" | cat - Podfile > temp && mv temp Podfile
          fi
          cd ..

      - name: Aggressive Code Signing Removal
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          # Backup original
          cp "$PBXPROJ" "${PBXPROJ}.backup"

          # Remove all DEVELOPMENT_TEAM lines
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"

          # Remove all CODE_SIGN_IDENTITY lines  
          sed -i '' '/CODE_SIGN_IDENTITY/d' "$PBXPROJ"

          # Remove all PROVISIONING_PROFILE lines
          sed -i '' '/PROVISIONING_PROFILE/d' "$PBXPROJ"

          # Remove CODE_SIGN_STYLE
          sed -i '' '/CODE_SIGN_STYLE/d' "$PBXPROJ"

          # Add CODE_SIGNING_ALLOWED and CODE_SIGNING_REQUIRED to buildSettings
          awk '/buildSettings = {/ && !done {print; print "\t\t\t\tCODE_SIGNING_ALLOWED = NO;"; print "\t\t\t\tCODE_SIGNING_REQUIRED = NO;"; done=1; next}1' "$PBXPROJ" > "${PBXPROJ}.tmp"
          mv "${PBXPROJ}.tmp" "$PBXPROJ"

          # Do it again for all buildSettings occurrences
          perl -i -pe 's/(buildSettings = \{)/$1\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ"

      - name: Modify Info.plist to disable signing requirements
        run: |
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/Runner/Info.plist || true

      - name: Clean CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod cache clean --all || true
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build iOS with xcodebuild directly
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build
          cd ..

      - name: Create IPA from build output
        run: |
          # Find the .app bundle
          APP_PATH=$(find build/ios -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found"
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FlutterIpaExport.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: FlutterIpaExport.ipa
